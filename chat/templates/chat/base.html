<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Relay Chat{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0d0d0f;
    --surface:  #141418;
    --surface2: #1c1c22;
    --border:   #2a2a35;
    --accent:   #7b5ea7;
    --accent2:  #c084fc;
    --green:    #4ade80;
    --red:      #f87171;
    --text:     #e8e8f0;
    --muted:    #6b6b80;
    --own-bg:   #1e1730;
    --own-bdr:  #7b5ea7;
    --radius:   12px;
    --font-ui:  'Syne', sans-serif;
    --font-mono:'DM Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    min-height: 100vh;
    overflow-x: hidden;
  }

  a { color: var(--accent2); text-decoration: none; }
  a:hover { text-decoration: underline; }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 18px; border-radius: 8px; border: none;
    font-family: var(--font-ui); font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all .15s ease; letter-spacing: .03em;
  }
  .btn-primary   { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent2); color: #000; }
  .btn-ghost     { background: transparent; border: 1px solid var(--border); color: var(--muted); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent2); }
  .btn-danger    { background: transparent; border: 1px solid #3b1e1e; color: var(--red); }
  .btn-danger:hover { background: #3b1e1e; }
  .btn-sm        { padding: 5px 12px; font-size: 12px; }

  .messages-flash {
    position: fixed; top: 16px; right: 16px; z-index: 9999;
    display: flex; flex-direction: column; gap: 8px; max-width: 320px;
  }
  .flash {
    padding: 12px 18px; border-radius: 10px; font-size: 13px;
    background: var(--surface2); border: 1px solid var(--border);
    animation: slideIn .25s ease;
  }
  .flash.error   { border-color: var(--red); color: var(--red); }
  .flash.success { border-color: var(--green); color: var(--green); }
  .flash.info    { border-color: var(--accent); color: var(--accent2); }

  @keyframes slideIn {
    from { transform: translateX(120%); opacity: 0; }
    to   { transform: translateX(0); opacity: 1; }
  }

  /* noise texture overlay */
  body::before {
    content: ''; pointer-events: none;
    position: fixed; inset: 0; z-index: 9998;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: .4;
  }
</style>
{% block extra_css %}{% endblock %}
</head>
<body>
<div class="messages-flash" id="flash-container">
  {% for message in messages %}
    <div class="flash {{ message.tags }}">{{ message }}</div>
  {% endfor %}
</div>

{% block content %}{% endblock %}

<script>
  // Auto-dismiss flash messages
  setTimeout(() => {
    document.querySelectorAll('.flash').forEach(el => {
      el.style.transition = 'opacity .4s';
      el.style.opacity = '0';
      setTimeout(() => el.remove(), 400);
    });
  }, 3500);
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
